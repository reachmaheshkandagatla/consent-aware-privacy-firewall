<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Consent-Aware Privacy Firewall — Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="caf-app">
      <aside class="caf-sidebar">
        <div class="logo">CAF</div>
        <nav>
          <a id="nav-dashboard" class="active">Dashboard</a>
          <a id="nav-policies">Policies</a>
          <a id="nav-audit">Audit Logs</a>
          <a id="nav-analytics">Analytics</a>
          <a id="nav-settings">Settings</a>
        </nav>
      </aside>
      <main id="main-content" class="caf-main">
        <!-- Main content is rendered dynamically by dashboard.js -->
      </main>
    </div>
    <script src="../src/storage.js"></script>
    <script src="dashboard.js"></script>
    <div id="log-modal" style="display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999">
      <div style="background:#fff;padding:16px;border-radius:8px;max-width:900px;width:90%;max-height:80%;overflow:auto;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <strong>Log Details</strong>
          <button id="close-log-modal">Close</button>
        </div>
        <div id="log-modal-body" style="font-family:monospace;font-size:13px;white-space:pre-wrap;color:#111"></div>
      </div>
    </div>
  </body>
</html>
